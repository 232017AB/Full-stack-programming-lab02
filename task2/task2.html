<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2 – Interactive Calculator</title>
</head>

<body>

    <h1>Interactive Calculator</h1>

    <label for="num1">Number 1:</label><br />
    <input type="number" id="num1" placeholder="Enter first number" /><br /><br />

    <label for="operation">Operation:</label><br />
    <select id="operation">
        <option value="add">Addition (+)</option>
        <option value="subtract">Subtraction (−)</option>
        <option value="multiply">Multiplication (×)</option>
        <option value="divide">Division (÷)</option>
    </select><br /><br />

    <label for="num2">Number 2:</label><br />
    <input type="number" id="num2" placeholder="Enter second number" /><br /><br />

    <button onclick="calculate()">Calculate</button>
    <button onclick="resetCalculator()">Reset</button>

    <div id="result"></div>

    <script src="task2.js"></script>

</body>

</html>
